<!DOCTYPE html>
<html>
<head>
<title>Order Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:40px">

<h2>Order Tracking</h2>

<input id="orderInput" placeholder="Enter Order Number" style="padding:10px">
<button onclick="searchOrder()">Search</button>

<br><br>

<table border="1" cellpadding="10" id="results">
<thead>
<tr>
<th>Order</th>
<th>Product</th>
<th>Status</th>
<th>Local Tracking</th>
<th>International Tracking</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const supabaseUrl = "https://yausicnswimaputggffv.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdXNpY25zd2ltYXB1dGdnZmZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE5MDEsImV4cCI6MjA4ODgxNzkwMX0.ASonY_8-ZI5ep_aIO0CoT-6InjayicDWdhi7YmKVEcs"

const client = supabase.createClient(supabaseUrl, supabaseKey)

async function searchOrder(){

const term = document.getElementById("orderInput").value.trim()

const { data, error } = await client
.from("order_items")
.select("order_number,product_name,status,local_tracking,international_tracking")
.or(`product_name.ilike.%${term}%,order_number.ilike.%${term}%`)

const table = document.querySelector("#results tbody")

table.innerHTML = ""

if(!data || data.length === 0){

table.innerHTML = `
<tr>
<td colspan="5" style="text-align:center">
No items found
</td>
</tr>
`

return

}

data.forEach(item => {

table.innerHTML += `
<tr>
<td>${item.order_number}</td>
<td>${item.product_name}</td>
<td>${item.status}</td>
<td>${item.local_tracking || ""}</td>
<td>${item.international_tracking || ""}</td>
</tr>
`

})

}
</script>

</body>
</html>
